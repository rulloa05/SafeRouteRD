<div class="signup">
  <div class="signup__head">
    <div class="sbar light"><span>9:41</span><span>100%</span></div>
    <button class="signup__back" (click)="router.navigate(['/auth/splash'])">← Volver</button>
    <div style="margin-top:8px">
      <div class="signup__title">Crear cuenta</div>
      <div class="signup__sub">Únete a Safe Routes Guardian</div>
    </div>
  </div>

  <div class="signup__card">
    <div class="signup__error" *ngIf="errorMsg">
      ⚠️ {{ errorMsg }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Nombre completo *</label>
        <input placeholder="Ej. Carlos Martínez" formControlName="fullName"/>
        <span style="font-size:11px;color:#ff8a7a;margin-top:3px;display:block"
          *ngIf="err('fullName')">Este campo es requerido</span>
      </div>

      <div class="field">
        <label>Correo electrónico *</label>
        <input type="email" placeholder="tu@correo.com" formControlName="email"/>
        <span style="font-size:11px;color:#ff8a7a;margin-top:3px;display:block"
          *ngIf="err('email')">Ingresa un correo válido</span>
      </div>

      <div class="field">
        <label>Contraseña * (mín. 6 caracteres)</label>
        <input type="password" placeholder="••••••••" formControlName="password"/>
        <span style="font-size:11px;color:#ff8a7a;margin-top:3px;display:block"
          *ngIf="err('password')">Mínimo 6 caracteres</span>
      </div>

      <div class="field">
        <label>Confirmar contraseña *</label>
        <input type="password" placeholder="Repite la contraseña" formControlName="confirmPassword"/>
      </div>

      <div class="field">
        <label>Teléfono móvil</label>
        <input type="tel" placeholder="+1 809 000 0000" formControlName="phone"/>
      </div>

      <div class="field">
        <label>Fecha de nacimiento</label>
        <input type="date" formControlName="dateOfBirth"/>
      </div>

      <div class="field">
        <label>Ciudad / Sector</label>
        <input placeholder="Ej. Santo Domingo Este" formControlName="stateCity"/>
      </div>

      <button class="btn btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Creando cuenta...' : 'Crear cuenta →' }}
      </button>
    </form>

    <div class="login__divider">o regístrate con</div>
    <div class="login__social-row">
      <button class="login__social-btn login__social-btn--full" type="button" (click)="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Registrarse con Google
      </button>
    </div>

    <div class="signup__footer">
      ¿Ya tienes cuenta?
      <a routerLink="/auth/login">Inicia sesión</a>
    </div>
  </div>
</div>
