<div class="splash">
  <!-- Status bar -->
  <div class="sbar light"><span>9:41</span><span>●● WiFi 100%</span></div>

  <div class="splash__content">
    <!-- Logo slot -->
    <div class="splash__logo-slot">
      <span class="splash__logo-placeholder">📍</span>
    </div>

    <div class="splash__name">Safe Routes<br>Guardian</div>
    <div class="splash__tagline">Navegación inteligente adaptada<br>a tu vehículo y las condiciones reales</div>

    <div class="splash__pill">⭐ Protege tu vehículo. Llega mejor.</div>

    <!-- Mini map SVG -->
    <div class="splash__mini-map">
      <svg viewBox="0 0 240 150" width="240" height="150">
        <rect width="240" height="150" fill="#0d2e26"/>
        <line x1="0" y1="75" x2="240" y2="75" stroke="#1a4a38" stroke-width="16"/>
        <line x1="120" y1="0" x2="120" y2="150" stroke="#1a4a38" stroke-width="12"/>
        <path d="M24 120 Q68 75 120 75 Q170 75 214 30" stroke="#0d7377" stroke-width="3.5" fill="none" stroke-dasharray="6,3"/>
        <path d="M24 50 Q68 75 120 75" stroke="#e74c3c" stroke-width="3" fill="none" stroke-dasharray="4,3"/>
        <circle cx="24" cy="120" r="6" fill="#0d7377"/>
        <circle cx="214" cy="30" r="8" fill="#d4a843" stroke="#fff" stroke-width="2"/>
        <text x="214" y="34" font-size="8" fill="white" text-anchor="middle" font-weight="bold">B</text>
        <rect x="124" y="108" width="8" height="4" rx="1" fill="#0d7377"/>
        <text x="136" y="112" font-size="7" fill="#8ecfbe">Ruta segura</text>
        <rect x="124" y="118" width="8" height="4" rx="1" fill="#e74c3c"/>
        <text x="136" y="122" font-size="7" fill="#8ecfbe">Vía dañada</text>
      </svg>
    </div>

    <div class="splash__sdg">
      <span class="splash__sdg-icon">🏙️</span>
      <span>Contribuye al ODS 11 — Ciudades y Comunidades Sostenibles</span>
    </div>
  </div>

  <!-- Slide dots -->
  <div class="splash__dots">
    <span class="splash__dot" [class.splash__dot--active]="currentSlide === 0"></span>
    <span class="splash__dot" [class.splash__dot--active]="currentSlide === 1"></span>
    <span class="splash__dot" [class.splash__dot--active]="currentSlide === 2"></span>
  </div>

  <!-- Buttons — son los únicos que navegan -->
  <div class="splash__btns">
    <button class="btn btn-gold" routerLink="/auth/login">Iniciar sesión</button>
    <button class="btn btn-outline" routerLink="/auth/sign-up">Crear cuenta</button>
  </div>
</div>
