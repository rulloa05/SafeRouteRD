<div class="forgot">
  <div class="forgot__head">
    <div class="sbar light"><span>9:41</span><span>100%</span></div>
    <button class="forgot__back" routerLink="/auth/login">← Volver</button>
    <div class="forgot__title">Recuperar contraseña</div>
    <div class="forgot__sub">Te enviaremos un enlace de recuperación</div>
  </div>
  <div class="forgot__card">
    <p class="forgot__hint">Ingresa tu correo registrado y te enviaremos instrucciones para restablecer tu contraseña.</p>
    <div class="forgot__success" *ngIf="sent">✅ ¡Correo enviado! Revisa tu bandeja de entrada.</div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field"><label>Correo electrónico</label>
        <input type="email" placeholder="tu@correo.com" formControlName="email"/>
      </div>
      <button class="btn btn-primary" type="submit" [disabled]="loading || sent">
        {{ sent ? 'Correo enviado ✓' : loading ? 'Enviando...' : 'Enviar enlace' }}
      </button>
    </form>
    <div style="text-align:center;margin-top:16px;font-size:13px;color:#6c757d">
      <a routerLink="/auth/login" style="color:#0d7377;font-weight:700">← Volver al inicio de sesión</a>
    </div>
  </div>
</div>
